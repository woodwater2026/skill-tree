<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Tree</title>
    <meta http-equiv="refresh" content="0; url=./web/" />
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #0b1020;
        color: #ecf1ff;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        max-width: 720px;
        padding: 28px 32px;
        border: 1px solid #27345f;
        border-radius: 18px;
        background: #121933;
        box-shadow: 0 18px 40px rgba(0,0,0,.25);
      }
      h1 { margin: 0 0 12px; font-size: 36px; }
      p { color: #9dacd2; line-height: 1.6; }
      a {
        color: #8bb4ff;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover { text-decoration: underline; }
      code {
        background: #0d1430;
        border: 1px solid #27345f;
        border-radius: 8px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Skill Tree</h1>
      <p>Redirecting to the public catalog and audit UI…</p>
      <p>
        If the redirect does not trigger, open
        <a href="./web/">the Skill Tree web UI</a>.
      </p>
      <p>
        Direct entry: <code>/web/</code>
      </p>
    </main>
  </body>
</html>
